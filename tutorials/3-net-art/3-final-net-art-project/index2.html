<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Level 2</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<main>
    
    <div class="difference-two" id="level-two">
        <img src="media/findthediff2.png" alt="find-the-difference2" usemap="#image-map-two">
        <map name="image-map-two">
            <area shape="rect" coords="1302,317,1256,268" alt="first-difference" title="first-difference2" href="#" onclick="findDiff(1, 2)">
            <area shape="rect" coords="1093,248,1181,412" alt="second-difference" title="second-difference2" href="#" onclick="findDiff(2, 2)">
        </map>
    </div>

    <script>
        const found = new Set();

        function findDiff(diffNumber, total) {

            found.add(diffNumber);
            const remaining = total - found.size;

            if (remaining > 0) {

                alert('You found one!');

            } else {

                alert('You found them all! Moving to level 3...');
                window.location.href = 'index3.html';
            }
        }
    </script>

</main>
</body>
</html>
